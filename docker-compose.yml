version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: argus-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-timescaledb.sql:/docker-entrypoint-initdb.d/01-timescaledb.sql
      - ./src/database/migrations:/docker-entrypoint-initdb.d/02-migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - argus-network

  mqtt:
    image: eclipse-mosquitto:2.0-alpine
    container_name: argus-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./config/mosquitto/passwd:/mosquitto/config/passwd:ro
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "test/health", "-m", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - argus-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: argus-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://argus:argus@postgres:5432/argus
      DB_POOL_SIZE: 20
      MQTT_BROKER_URL: mqtt://mqtt:1883
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      MQTT_TELEMETRY_TOPIC: fleet/+/telemetry
      MQTT_RECONNECT_PERIOD_MS: 5000
      MQTT_CONNECT_TIMEOUT_MS: 10000
      JWT_SECRET: change-me-min-32-chars-dev-only-not-prod
      JWT_EXPIRES_IN: 8h
      MAPBOX_API_KEY: ""
      MAPBOX_TIMEOUT_MS: 10000
      LLM_PROVIDER_API_KEY: ""
      LLM_PROVIDER_URL: https://api.groq.com/openai/v1/chat/completions
      LLM_PROVIDER_MODEL: llama-3.3-70b-versatile
      LLM_PROVIDER_TIMEOUT_MS: 15000
      OPTIMIZATION_ENGINE_URL: http://localhost:8001
      OPTIMIZATION_ENGINE_TIMEOUT_MS: 20000
      SWARM_RECOVERY_TARGET_MS: 60000
      SWARM_RECOVERY_OPT_TIMEOUT_MS: 15000
      STALE_THRESHOLD_SECONDS: 180
      OFFLINE_THRESHOLD_SECONDS: 600
      WATCHDOG_INTERVAL_SECONDS: 60
      TELEMETRY_COMPRESS_AFTER_DAYS: 7
      TELEMETRY_DROP_AFTER_DAYS: 90
      LOW_VOLUME_THRESHOLD: 0.20
      MOVING_AVERAGE_WINDOW_DAYS: 7
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
      - /app/node_modules
    networks:
      - argus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  mqtt_data:
    driver: local
  mqtt_logs:
    driver: local

networks:
  argus-network:
    driver: bridge
